name: Build mtg v2.1.0 for Keenetic (mipsle)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go 1.15
        uses: actions/setup-go@v5
        with:
          go-version: '1.15'

      - name: Clone and patch mtg
        run: |
          git clone https://github.com/9seconds/mtg.git
          cd mtg
          git checkout v2.1.0

          # Отключаем futex_wakeup (не работает на ядре Keenetic 3.x)
          sed -i 's/futexwakeup/futexwakeup_disabled/g' internal/futex/futex_linux.go

          GOOS=linux GOARCH=mipsle GOMIPS=softfloat CGO_ENABLED=0 go build -o mtg -ldflags "-s -w"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtg-v2.1.0-mipsle-static
          path: mtg/mtg
