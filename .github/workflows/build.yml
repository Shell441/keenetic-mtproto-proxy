name: Build mtg v2.0.1 for Keenetic (mipsle)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go 1.14
        uses: actions/setup-go@v5
        with:
          go-version: '1.14'

      - name: Clone and build mtg
        run: |
          git clone https://github.com/9seconds/mtg.git
          cd mtg
          git checkout v2.0.1
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat CGO_ENABLED=0 go build -o mtg -ldflags "-s -w"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtg-v2.0.1-mipsle-static
          path: mtg/mtg
