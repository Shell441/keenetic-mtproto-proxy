name: Build static MTProto Proxy for Keenetic (mipsel)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget xz-utils

      - name: Download OpenWrt SDK (toolchain only)
        run: |
          wget -q https://downloads.openwrt.org/releases/21.02.0/targets/ramips/mt7621/openwrt-sdk-21.02.0-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-21.02.0-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz

      - name: Download and compile OpenSSL for mipsel
        run: |
          wget -q https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          tar -xzf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w

          export SDK_DIR="$(pwd)/../openwrt-sdk-21.02.0-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64"
          export PATH="${SDK_DIR}/staging_dir/toolchain-mipsel_24kc_gcc-8.4.0_musl/bin:${PATH}"
          export CC=mipsel-openwrt-linux-gcc
          export AR=mipsel-openwrt-linux-ar
          export RANLIB=mipsel-openwrt-linux-ranlib

          ./Configure linux-mips32 no-shared no-asm --prefix=${SDK_DIR}/staging_dir/target-mipsel_24kc_musl/usr
          make -j$(nproc)
          make install

      - name: Clone MTProxy source
        run: |
          git clone https://github.com/TelegramMessenger/MTProxy.git

      - name: Patch MTProxy for MIPS
        run: |
          cd MTProxy

          # Убираем drand48_data и drand48_r
          sed -i '/struct drand48_data rand_data;/d' jobs/jobs.h
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/drand48_r(\&.*, \&.*)/rand()/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/srand48_r(.*, \&.*)/srand(time(NULL))/g' {} +

          # Убираем rdtsc()
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/extra->start_rdtsc = rdtsc ();/extra->start_rdtsc = 0;/g' {} +
          find . -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/rdtsc()/0/g' {} +

          # Удаляем ВООБЩЕ ВСЕ проблемные функции из common/crc32c.c
          # Удаляем crc32c_hw (содержит ассемблерные инструкции)
          sed -i '/^unsigned crc32c_hw/,/^}/d' common/crc32c.c
          # Удаляем crc32c_combine_clmul (тоже содержит crc32b/l)
          sed -i '/^static unsigned crc32c_combine_clmul/,/^}/d' common/crc32c.c
          # Удаляем crc32c_combine (если есть)
          sed -i '/^unsigned crc32c_combine/,/^}/d' common/crc32c.c
          # На всякий случай удаляем crc32_residue (если использует asm)
          sed -i '/^static unsigned crc32c_residue/,/^}/d' common/crc32c.c

          # Перенаправляем crc32c_hw -> crc32c_soft (на случай если где-то вызывается)
          echo "#define crc32c_hw crc32c_soft" >> common/crc32c.h

      - name: Build static binary for mipsel
        run: |
          export SDK_DIR="$(pwd)/openwrt-sdk-21.02.0-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64"
          export PATH="${SDK_DIR}/staging_dir/toolchain-mipsel_24kc_gcc-8.4.0_musl/bin:${PATH}"
          export CC=mipsel-openwrt-linux-gcc
          export AR=mipsel-openwrt-linux-ar
          export RANLIB=mipsel-openwrt-linux-ranlib
          export STAGING_DIR="${SDK_DIR}/staging_dir"

          export TARGET_INCLUDE="${SDK_DIR}/staging_dir/target-mipsel_24kc_musl/usr/include"
          export TARGET_LIB="${SDK_DIR}/staging_dir/target-mipsel_24kc_musl/usr/lib"

          cd MTProxy

          sed -i 's/ARCH_FLAGS = -mpclmul -march=core2 -mfpmath=sse -mssse3/ARCH_FLAGS = -march=24kc/' Makefile
          sed -i 's/CFLAGS = \$(ARCH) -O3 -std=gnu11 -Wall -Wno-array-bounds -mpclmul -march=core2 -mfpmath=sse -mssse3 -fno-strict-aliasing/CFLAGS = \$(ARCH) -O3 -std=gnu11 -Wall -Wno-array-bounds -march=24kc -fno-strict-aliasing/' Makefile

          make clean
          make CINCLUDE="-iquote common -iquote . -I${TARGET_INCLUDE}" \
               LDFLAGS="-static -L${TARGET_LIB} -lssl -lcrypto -lpthread" \
               all

      - name: Check binary
        run: |
          file MTProxy/objs/bin/mtproto-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtproto-proxy-mipsel-static
          path: MTProxy/objs/bin/mtproto-proxy
