name: Build mtg v1.0.4 patched for Keenetic

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go 1.13
        uses: actions/setup-go@v5
        with:
          go-version: '1.13'

      - name: Clone and patch mtg
        run: |
          git clone https://github.com/9seconds/mtg.git
          cd mtg
          git checkout v1.0.4

          # Заменяем telegram/init.go на заглушку
          cat > telegram/init.go << 'EOF'
          package telegram

          func Init() {
              // Stub: no network request
          }
          EOF

          # Удаляем принудительный вызов Init() из cli/proxy.go
          sed -i '/telegram.Init()/d' cli/proxy.go

          GOOS=linux GOARCH=mipsle GOMIPS=softfloat CGO_ENABLED=0 go build -o mtg -ldflags "-s -w"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtg-v1.0.4-patched-mipsle
          path: mtg/mtg
