name: Build mtg v1.0.11 patched for Keenetic (mipsle)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go 1.13
        uses: actions/setup-go@v5
        with:
          go-version: '1.13'

      - name: Clone and patch mtg v1.0.11
        run: |
          git clone https://github.com/9seconds/mtg.git
          cd mtg
          git checkout v1.0.11

          # Патчим Init(), чтобы не обращался к core.telegram.org
          sed -i '/^func Init() {/a\    return' telegram/init.go

          # Удаляем вызов telegram.Init() и ненужный импорт в cli/proxy.go
          sed -i '/telegram.Init()/d' cli/proxy.go
          sed -i '/\"github.com\/9seconds\/mtg\/telegram\"/d' cli/proxy.go

          # Убираем импорт telegram, если он остался
          sed -i '/\"github.com\/9seconds\/mtg\/telegram\"/d' cli/*.go

          GOOS=linux GOARCH=mipsle GOMIPS=softfloat CGO_ENABLED=0 go build -o mtg -ldflags "-s -w"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtg-v1.0.11-patched-mipsle
          path: mtg/mtg
