name: Build mtg v1.0.0 for Keenetic (mipsle)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go 1.13
        uses: actions/setup-go@v5
        with:
          go-version: '1.13'

      - name: Build mtg v1.0.0 for mipsle
        run: |
          git clone https://github.com/9seconds/mtg.git
          cd mtg
          git checkout v1.0.0
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat CGO_ENABLED=0 go build -o mtg -ldflags "-s -w"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtg-v1.0.0-mipsle-static
          path: mtg/mtg
